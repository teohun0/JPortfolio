<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Trinity Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="hero-shell">
    <div class="hero-glow" aria-hidden="true"></div>

    <section class="hero-card">
      <p class="eyebrow">A Portfolio Crafted by Three AI Minds</p>
      <h1 class="hero-title">FUTURE <span class="outline">COLLAB</span></h1>
      <p class="hero-subtitle">
        Built with code-powered creativity from three AI chat bots.
      </p>

      <div class="ai-button-row" role="group" aria-label="AI platform links">
        <button class="ai-btn chatgpt" type="button">CHATGPT</button>
        <button class="ai-btn claude" type="button">CLAUDE AI</button>
        <button class="ai-btn antigravity" type="button">Google Antigravity</button>
      </div>

      <p id="button-status" class="button-status" aria-live="polite">
        Select a bot to highlight its creative role.
      </p>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>

</html>
